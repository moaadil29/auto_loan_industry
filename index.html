<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Auto Loan Market — Capital One ALS Strategy Deck</title>

<style>
* { margin:0; padding:0; box-sizing:border-box }

:root {
  --ink:#1a1a1a;
  --muted:#6b7280;
  --faint:#9ca3af;
  --surface:#f3f4f6;
  --card:#ffffff;
  --border:rgba(0,0,0,0.08);
  --border-med:rgba(0,0,0,0.14);
  --accent:#1a5fa8;
  --warn:#c0392b;
  --amber:#b07818;
  --green:#27714a;
  --r:12px;
  --rmd:8px;
}

@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0f0f0;
    --muted:#9ca3af;
    --faint:#6b7280;
    --surface:#1e2330;
    --card:#252c3a;
    --border:rgba(255,255,255,0.08);
    --border-med:rgba(255,255,255,0.14);
  }
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#f8f9fb;
  color:var(--ink);
  min-height:100vh;
}

@media(prefers-color-scheme:dark){
  body{background:#131720}
}

.shell{
  max-width:1100px;
  margin:0 auto;
  padding:20px 24px 48px;
}

.deck-header{
  display:flex;
  justify-content:space-between;
  padding:12px 0 16px;
  border-bottom:0.5px solid var(--border-med);
  margin-bottom:20px;
}

.deck-brand{
  font-size:12px;
  color:var(--faint);
}
.deck-brand span{color:var(--accent)}

.nav-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.nav-pills{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}

.pill{
  padding:4px 11px;
  border-radius:20px;
  font-size:11px;
  border:0.5px solid var(--border-med);
  color:var(--muted);
  cursor:pointer;
}

.pill.on,
.pill:hover{
  background:var(--accent);
  color:#fff;
}

.slide{display:none}
.slide.active{display:block}

.slide-title{
  font-size:22px;
  margin-bottom:6px;
}

.card{
  background:var(--card);
  border-radius:var(--r);
  padding:16px;
  margin-bottom:12px;
}

.kpi{
  background:var(--surface);
  padding:14px;
  border-radius:var(--rmd);
}

.kpi-num{
  font-size:24px;
  font-weight:500;
}

.chart-wrap{
  width:100%;
  height:220px;
}

</style>
</head>

<body>

<div class="shell">

<div class="deck-header">
  <div class="deck-brand">
    <span>Capital One</span> · Auto Lending Strategy · March 2026 · Confidential
  </div>
</div>

<div class="nav-bar">
  <div class="nav-pills" id="pills"></div>
  <div>
    <button onclick="go(-1)">←</button>
    <button onclick="go(1)">→</button>
  </div>
</div>

<div id="slides-container"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
const SLIDES = [

{
  label:'Cover',
  render:()=>`
    <div class="slide-header">
      <div class="slide-title">
        The U.S. auto loan market is at an inflection point
      </div>
      <p>$1.67T in balances. Rising delinquencies. Banks returning.</p>
    </div>
  `
},

{
  label:'Market',
  render:()=>`
    <div class="card">
      <div class="slide-title">Market size</div>
      <div class="chart-wrap">
        <canvas id="chart1"></canvas>
      </div>
    </div>
  `,
  after:()=>{
    new Chart(document.getElementById('chart1'),{
      type:'bar',
      data:{
        labels:['2019','2020','2021','2022','2023','2024'],
        datasets:[{
          data:[1277,1255,1370,1490,1610,1660]
        }]
      }
    })
  }
}

];

let cur=0;
const container=document.getElementById('slides-container');
const pills=document.getElementById('pills');

SLIDES.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='pill'+(i===0?' on':'');
  btn.innerText=s.label;
  btn.onclick=()=>goTo(i);
  pills.appendChild(btn);
});

function render(i){
  const div=document.createElement('div');
  div.className='slide active';
  div.innerHTML=SLIDES[i].render();
  container.innerHTML='';
  container.appendChild(div);
  if(SLIDES[i].after) SLIDES[i].after();
}

function goTo(i){
  cur=i;
  render(cur);
}

function go(d){
  cur = (cur + d + SLIDES.length) % SLIDES.length;
  render(cur);
}

render(0);
</script>

</body>
</html>
