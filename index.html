<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Auto Loan Market — Capital One ALS Strategy Deck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1a1a1a;
  --muted:#6b7280;
  --faint:#9ca3af;
  --surface:#f3f4f6;
  --card:#ffffff;
  --border:rgba(0,0,0,0.08);
  --border-med:rgba(0,0,0,0.14);
  --accent:#1a5fa8;
  --warn:#c0392b;
  --amber:#b07818;
  --green:#27714a;
  --r:12px;
  --rmd:8px
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0f0f0;
    --muted:#9ca3af;
    --faint:#6b7280;
    --surface:#1e2330;
    --card:#252c3a;
    --border:rgba(255,255,255,0.08);
    --border-med:rgba(255,255,255,0.14);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8f9fb;color:var(--ink);min-height:100vh}
@media(prefers-color-scheme:dark){body{background:#131720}}

.shell{max-width:1100px;margin:0 auto;padding:20px 24px 48px}

.deck-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:0.5px solid var(--border-med);margin-bottom:20px}
.deck-brand{font-size:12px;font-weight:500;color:var(--faint);letter-spacing:.04em}
.deck-brand span{color:var(--accent)}

.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.nav-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;border:0.5px solid var(--border-med);color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.pill.on,.pill:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-right{display:flex;align-items:center;gap:8px}
.arr{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border-med);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .15s;font-family:inherit}
.arr:hover{background:var(--surface);color:var(--ink)}
.arr:disabled{opacity:.3;cursor:default}
.slide-count{font-size:11px;color:var(--faint);min-width:36px;text-align:center}

.slide{display:none;animation:fadeIn .22s ease}
.slide.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.slide-header{margin-bottom:18px}
.eyebrow{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.slide-title{font-size:22px;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:6px}
.slide-subtitle{font-size:13px;color:var(--muted);line-height:1.55;max-width:700px}

.grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:720px){.grid-2,.grid-4{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr 1fr}}

.kpi{background:var(--surface);border-radius:var(--rmd);padding:14px 16px}
.kpi-num{font-size:26px;font-weight:500;line-height:1;margin-bottom:4px;color:var(--ink)}
.kpi-num.danger{color:var(--warn)}
.kpi-num.positive{color:var(--green)}
.kpi-num.amber{color:var(--amber)}
.kpi-num.blue{color:var(--accent)}
.kpi-lbl{font-size:11px;color:var(--muted);line-height:1.4}
.kpi-src{font-size:10px;color:var(--faint);margin-top:3px}

.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:16px}
.card-label{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}

.chart-wrap{position:relative;width:100%}

.source-tag{font-size:10px;color:var(--faint);text-align:right;margin-top:8px}
.source-tag a{color:var(--faint);text-decoration:none}
.source-tag a:hover{color:var(--accent)}

.insight{border-left:2px solid var(--accent);padding:9px 13px;margin-top:12px;background:var(--surface);border-radius:0 var(--rmd) var(--rmd) 0}
.insight p{font-size:12.5px;color:var(--muted);line-height:1.55;margin:0}
.insight strong{color:var(--ink)}

.callout{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-radius:var(--rmd);background:var(--surface);margin-top:10px}
.callout-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.callout-dot.red{background:var(--warn)}
.callout-dot.green{background:var(--green)}
.callout-dot.amber{background:var(--amber)}
.callout-dot.blue{background:var(--accent)}
.callout-text{font-size:12.5px;color:var(--muted);line-height:1.55}
.callout-text strong{color:var(--ink)}

.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.tog-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tog-btn{padding:3px 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--border-med);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
.tog-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

.cover-hero{display:flex;flex-direction:column;min-height:360px;padding:8px 0 24px;justify-content:center}
.cover-hero h1{font-size:34px;font-weight:400;line-height:1.15;color:var(--ink);margin-bottom:12px}
.cover-hero h1 em{font-style:italic;color:var(--accent)}
.cover-hero p{font-size:14px;color:var(--muted);line-height:1.6;max-width:580px;margin-bottom:20px}
.meta-row{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:20px}
.meta-item .ml{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.meta-item .mv{font-size:13px;color:var(--ink)}
.src-box{padding:12px 14px;background:var(--surface);border-radius:var(--rmd);font-size:11px;color:var(--faint);line-height:1.7;max-width:660px}
.src-box strong{color:var(--muted)}
.start-btn{margin-top:18px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--rmd);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;font-family:inherit}
.start-btn:hover{opacity:.88}

.action-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:4px}
@media(max-width:720px){.action-grid{grid-template-columns:1fr}}
.action-card{padding:15px;border-radius:var(--rmd);border:0.5px solid var(--border);background:var(--card)}
.action-card.urgent{border-left:2px solid var(--warn)}
.action-card.growth{border-left:2px solid var(--green)}
.action-card.watch{border-left:2px solid var(--amber)}
.ac-num{font-size:10px;font-weight:600;color:var(--faint);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.ac-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.3}
.ac-body{font-size:11.5px;color:var(--muted);line-height:1.5}
.ac-src{font-size:10px;color:var(--faint);margin-top:7px}

.peer-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:4px}
.peer-table th{text-align:left;padding:8px 10px;background:var(--surface);border-bottom:0.5px solid var(--border-med);color:var(--muted);font-weight:500}
.peer-table th.cap{color:var(--warn)}
.peer-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--muted)}
.peer-table td.cap{color:var(--warn);font-weight:500}
.peer-table tr:last-child td{border-bottom:none}
</style>
</head>
<body>
<div class="shell">

<div class="deck-header">
  <div class="deck-brand"><span>Capital One</span> &nbsp;·&nbsp; Auto Lending Strategy &nbsp;·&nbsp; March 2026 &nbsp;·&nbsp; Confidential</div>
</div>

<div class="nav-bar">
  <div class="nav-pills" id="pills"></div>
  <div class="nav-right">
    <span class="slide-count" id="sc">1 / 14</span>
    <button class="arr" id="prevBtn" onclick="go(-1)" disabled>&#8592;</button>
    <button class="arr" id="nextBtn" onclick="go(1)">&#8594;</button>
  </div>
</div>

<div id="slides-container"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const C={accent:'#1a5fa8',warn:'#c0392b',amber:'#b07818',green:'#27714a',teal:'#1d9e75',mid:'#888',gray:'#aaa',lt:'#378add'};
const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
const gCol=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
const tCol=isDark?'#9ca3af':'#6b7280';

function ax(){return{ticks:{color:tCol,font:{size:10}},grid:{color:gCol}}}
function axNoGrid(){return{ticks:{color:tCol,font:{size:10}},grid:{display:false}}}
function legCfg(){return{labels:{color:tCol,font:{size:10},boxWidth:10,padding:10}}}

const SLIDES=[


{id:'mkt',label:'Market size',render:()=>`
<div class="slide-header">
  <div class="eyebrow">Chapter 1 · Market size</div>
  <div class="slide-title">Balances doubled since 2011. Growth is now compressing.</div>
  <div class="slide-subtitle">The market hit $1.67T in Q4 2025 — a record. But annual growth has fallen from 8%+ to ~2%. The volume tailwind is fading.</div>
</div>
<div class="grid-4" style="margin-bottom:14px">
  <div class="kpi"><div class="kpi-num blue">$1.67T</div><div class="kpi-lbl">Outstanding Q4 2025</div><div class="kpi-src">NY Fed HHDC</div></div>
  <div class="kpi"><div class="kpi-num amber">+57%</div><div class="kpi-lbl">Growth since 2015</div><div class="kpi-src">NY Fed series</div></div>
  <div class="kpi"><div class="kpi-num danger">~2–3%</div><div class="kpi-lbl">Current annual growth</div><div class="kpi-src">NY Fed Q4 2025</div></div>
  <div class="kpi"><div class="kpi-num">2.5%</div><div class="kpi-lbl">Forecast CAGR 2024–28</div><div class="kpi-src">ALS estimate</div></div>
</div>
<div class="card">
  <div class="card-label">Outstanding auto loan balance ($Bn) — 2011 to 2028f</div>
  <div class="chart-wrap" style="height:240px"><canvas id="ch_mkt"></canvas></div>
  <div class="source-tag"><a href="https://www.newyorkfed.org/microeconomics/hhdc" target="_blank">↗ NY Fed Household Debt & Credit Report</a></div>
</div>
<div class="insight"><p><strong>The inflection is real:</strong> Pre-COVID CAGR was 4.1%. Post-COVID surge (2021–22) was driven by loan size inflation, not new borrowers. Forecast reverts to 2.5% as affordability constrains demand.</p></div>`,
after:()=>{
  const labels=['2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026f','2027f','2028f'];
  const data=[730,779,840,906,1064,1115,1170,1220,1277,1255,1370,1490,1610,1660,1700,1745,1790,1840];
  const colors=data.map((_,i)=>i>=15?'rgba(26,95,168,0.4)':i===9?C.warn:C.accent);
  mk('ch_mkt',{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:2,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>'$'+v.raw+'Bn'}}},scales:{x:axNoGrid(),y:{...ax(),min:600,ticks:{...ax().ticks,callback:v=>'$'+v+'Bn'}}}}});
}},

{id:'lenders',label:'Lender landscape',render:()=>`
<div class="slide-header">
  <div class="eyebrow">Chapter 2 · Lender landscape</div>
  <div class="slide-title">Banks left, then came back. Captives own new. Capital One owns used.</div>
  <div class="slide-subtitle">After pulling back in 2022–23, banks are re-entering aggressively. Wells Fargo originations +86.5% YoY Q4 2024. Capital One is being squeezed from above.</div>
</div>
<div class="grid-2">
  <div class="card">
    <div class="card-label">Annual originations by lender type ($Bn)</div>
    <div class="tog-row">
      <button class="tog-btn on" id="tg_s" onclick="toggleOrig('stacked')">Stacked</button>
      <button class="tog-btn" id="tg_g" onclick="toggleOrig('grouped')">Grouped</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#1a5fa8"></div>Banks</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#27714a"></div>Captives</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#b07818"></div>Credit unions</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#888"></div>Finance cos</div>
    </div>
    <div class="chart-wrap" style="height:200px"><canvas id="ch_orig"></canvas></div>
    <div class="source-tag"><a href="https://libertystreeteconomics.newyorkfed.org/2025/02/breaking-down-auto-loan-performance/" target="_blank">↗ NY Fed Liberty Street · Experian · Ally 10-K</a></div>
  </div>
  <div class="card">
    <div class="card-label">Outstanding balance share</div>
    <div class="tog-row">
      <button class="tog-btn on" id="ty_19" onclick="setYear('2019')">2019</button>
      <button class="tog-btn" id="ty_24" onclick="setYear('2024')">2024</button>
      <button class="tog-btn" id="ty_25" onclick="setYear('2025')">2025 est.</button>
    </div>
    <div class="chart-wrap" style="height:230px"><canvas id="ch_share"></canvas></div>
    <div class="source-tag"><a href="https://www.experian.com/blogs/insights/auto-the-automotive-finance-market-stabilizes-data-indicates-a-shift-in-lending-strategies/" target="_blank">↗ Experian Q1 2025 · LendingTree 2026</a></div>
  </div>
</div>
<div class="insight"><p><strong>Key dynamic:</strong> Captives hold 57% of new vehicle originations — but only 5.9% of used. Capital One's ~70% used vehicle mix is its structural insulation. The threat is in prime origination compression as banks return.</p></div>`,
after:()=>{
  const years=['2019','2020','2021','2022','2023','2024'];
  const dsBase=[
    {label:'Banks',data:[217,187,230,215,177,205],backgroundColor:C.accent},
    {label:'Captives',data:[180,154,209,208,189,179],backgroundColor:C.green},
    {label:'Credit unions',data:[118,116,158,160,146,141],backgroundColor:C.amber},
    {label:'Finance cos',data:[105,94,122,111,98,115],backgroundColor:C.mid},
  ];
  let origChart=mk('ch_orig',{type:'bar',data:{labels:years,datasets:dsBase},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,...axNoGrid()},y:{stacked:true,...ax(),ticks:{...ax().ticks,callback:v=>'$'+v+'Bn'}}}}});
  window.toggleOrig=(m)=>{
    document.getElementById('tg_s')?.classList.toggle('on',m==='stacked');
    document.getElementById('tg_g')?.classList.toggle('on',m==='grouped');
    const stacked=m==='stacked';
    origChart.options.scales.x.stacked=stacked;
    origChart.options.scales.y.stacked=stacked;
    origChart.update();
  };
  const sd={'2019':{l:['Banks','Captives','Credit unions','Finance cos','BHPH'],d:[35,25,20,13,7]},'2024':{l:['Banks','Captives','Credit unions','Finance cos','BHPH'],d:[32,25,22,14,7]},'2025':{l:['Banks','Captives','Credit unions','Finance cos','BHPH'],d:[33,24,22,14,7]}};
  const shareColors=[C.accent,C.green,C.amber,C.mid,C.warn];
  let shareChart=mk('ch_share',{type:'doughnut',data:{labels:sd['2019'].l,datasets:[{data:sd['2019'].d,backgroundColor:shareColors,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:tCol,font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:v=>v.label+': '+v.raw+'%'}}}}});
  window.setYear=(y)=>{
    const k=y.replace(' est.','');
    ['2019','2024','2025'].forEach(s=>{const el=document.getElementById('ty_'+s.slice(2));if(el)el.classList.toggle('on',s===k)});
    const d=sd[k]||sd['2019'];
    shareChart.data.labels=d.l;shareChart.data.datasets[0].data=d.d;shareChart.update();
  };
}},

{id:'credit',label:'Credit mix',render:()=>`
<div class="slide-header">
  <div class="eyebrow">Chapter 2 continued · Credit profile</div>
  <div class="slide-title">69% of the market is prime. Capital One lives in the other 31%.</div>
  <div class="slide-subtitle">That is a deliberate choice — higher yields, broader access, but concentrated risk. The question is whether the data edge still justifies the exposure.</div>
</div>
<div class="grid-2">
  <div class="card">
    <div class="card-label">Market origination mix by FICO tier (%)</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch_mix"></canvas></div>
    <div class="source-tag"><a href="https://www.experian.com/blogs/insights/tag/state-of-the-automotive-finance-market/" target="_blank">↗ Experian SAFM Q4 2024 · NY Fed Q1 2024</a></div>
  </div>
  <div class="card">
    <div class="card-label">Subprime share by lender (≤620 FICO, %)</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch_sub"></canvas></div>
    <div class="source-tag"><a href="https://libertystreeteconomics.newyorkfed.org/2025/02/breaking-down-auto-loan-performance/" target="_blank">↗ Capital One 10-K Dec 2023 · Ally 10-K · NY Fed</a></div>
  </div>
</div>
<div class="insight"><p>Capital One Dec 2023 10-K: <strong>$39Bn at FICO >660 (53%) · $14.8Bn at 621–660 (20%) · $20.4Bn at ≤620 (27.5%)</strong>. That's 47.5% near-prime or below — 3–5x peer banks. Ally intentionally moved away from this space in 2023–24.</p></div>`,

  mk('ch_sub',{type:'bar',data:{labels:['Capital One','Finance cos','Credit unions','Large banks','Ally','Captives','BHPH'],datasets:[{data:[27.5,45,13,6,6,5,90],backgroundColor:[C.warn,C.warn,C.amber,C.accent,C.green,C.lt,C.mid],borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>v.raw+'%'}}},scales:{x:{...ax(),max:100,ticks:{...ax().ticks,callback:v=>v+'%'}},y:axNoGrid()}}});
}},

{id:'delinq',label:'Delinquencies',render:()=>`
<div class="slide-header">
  <div class="eyebrow">Chapter 3 · Credit stress</div>
  <div class="slide-title">Delinquencies are at a 15-year high — and it's not about rates.</div>
  <div class="slide-subtitle">The NY Fed confirmed it in Feb 2025: "High delinquency rates are broad-based across credit scores and income levels." The cause is loan size. The 2021–23 vintage is the epicenter.</div>
</div>
<div class="grid-4" style="margin-bottom:14px">
  <div class="kpi"><div class="kpi-num danger">5.2%</div><div class="kpi-lbl">90+ DPD rate Q4 2025</div><div class="kpi-src">NY Fed · LendingTree 2026</div></div>
  <div class="kpi"><div class="kpi-num amber">4.9%</div><div class="kpi-lbl">Pre-pandemic baseline 2019</div><div class="kpi-src">NY Fed · CRS IF13179</div></div>
  <div class="kpi"><div class="kpi-num danger">+33%</div><div class="kpi-lbl">2022 deep-subprime DPD above 5-yr prior high</div><div class="kpi-src">CFPB Sep 2022</div></div>
  <div class="kpi"><div class="kpi-num danger">4%</div><div class="kpi-lbl">Quarterly DPD rate for FICO 620–679 (was 2% pre-pandemic)</div><div class="kpi-src">NY Fed Feb 2025</div></div>
</div>
<div class="grid-2">
  <div class="card">
    <div class="card-label">90+ DPD rate 2019–2025 vs pre-pandemic baseline</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch_dpd"></canvas></div>
    <div class="source-tag"><a href="https://www.newyorkfed.org/microeconomics/hhdc" target="_blank">↗ NY Fed HHDC Q4 2025 · LendingTree 2026</a></div>
  </div>
  <div class="card">
    <div class="card-label">90+ DPD by lender type — finance cos carry most risk</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch_ltype"></canvas></div>
    <div class="source-tag"><a href="https://libertystreeteconomics.newyorkfed.org/2025/02/breaking-down-auto-loan-performance/" target="_blank">↗ NY Fed Liberty Street Economics, Feb 2025</a></div>
  </div>
</div>
<div class="insight"><p><strong>The structural driver (Fed FEDS Note Sep 2024):</strong> Loans originated at 2021–22 peak vehicle prices have monthly payments that exceed near-prime borrower capacity — regardless of what rates do next. This clears only as the vintage seasons out through 2026.</p></div>`,
after:()=>{
  const lbls=['2019','2020','2021','2022','2023','Q1 24','Q2 24','Q3 24','Q4 24','Q4 25'];

let cur=0;
const container=document.getElementById('slides-container');
const pillsEl=document.getElementById('pills');
const scEl=document.getElementById('sc');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const rendered=new Set();
const chartReg={};

SLIDES.forEach((s,i)=>{
  const p=document.createElement('button');
  p.className='pill'+(i===0?' on':'');
  p.textContent=s.label;
  p.onclick=()=>goTo(i);
  pillsEl.appendChild(p);
});

function mk(id,cfg){
  if(chartReg[id]){chartReg[id].destroy();}
  const el=document.getElementById(id);
  if(!el)return null;
  chartReg[id]=new Chart(el,cfg);
  return chartReg[id];
}

function render(i){
  if(rendered.has(i))return;
  rendered.add(i);
  const div=document.createElement('div');
  div.className='slide';
  div.id='sl_'+i;
  div.innerHTML=SLIDES[i].render();
  container.appendChild(div);
}

function goTo(n){
  const prev=document.getElementById('sl_'+cur);
  if(prev)prev.classList.remove('active');
  pillsEl.children[cur]?.classList.remove('on');
  cur=Math.max(0,Math.min(n,SLIDES.length-1));
  render(cur);
  const next=document.getElementById('sl_'+cur);
  if(next)next.classList.add('active');
  pillsEl.children[cur]?.classList.add('on');
  scEl.textContent=(cur+1)+' / '+SLIDES.length;
  prevBtn.disabled=cur===0;
  nextBtn.textContent=cur===SLIDES.length-1?'↩ Restart':'&#8594;';
  if(SLIDES[cur].after){setTimeout(()=>{try{SLIDES[cur].after(cur)}catch(e){console.warn(e)}},80);}
}

function go(d){if(d===1&&cur===SLIDES.length-1){goTo(0);}else{goTo(cur+d);}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(1);if(e.key==='ArrowLeft')go(-1);});

render(0);
document.getElementById('sl_0').classList.add('active');
</script>
</body>
