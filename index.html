<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Auto Loan Market — Capital One ALS Strategy Deck</title>

<!-- (ALL STYLES UNCHANGED) -->
<style>
/* --- KEEPING YOUR ORIGINAL STYLES EXACTLY --- */
*{margin:0;padding:0;box-sizing:border-box}
:root{
--ink:#1a1a1a;
--muted:#6b7280;
--faint:#9ca3af;
--surface:#f3f4f6;
--card:#ffffff;
--border:rgba(0,0,0,0.08);
--border-med:rgba(0,0,0,0.14);
--accent:#1a5fa8;
--warn:#c0392b;
--amber:#b07818;
--green:#27714a;
--r:12px;
--rmd:8px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8f9fb;color:var(--ink)}
.shell{max-width:1100px;margin:0 auto;padding:20px 24px 48px}
.deck-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:0.5px solid var(--border-med);margin-bottom:20px}
.deck-brand{font-size:12px;font-weight:500;color:var(--faint)}
.nav-bar{display:flex;justify-content:space-between;margin-bottom:20px}
.nav-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;border:0.5px solid var(--border-med);cursor:pointer}
.pill.on{background:var(--accent);color:#fff}
.slide{display:none}
.slide.active{display:block}
</style>
</head>

<body>
<div class="shell">

<div class="deck-header">
<div class="deck-brand">Capital One · Auto Lending Strategy · March 2026</div>
</div>

<div class="nav-bar">
<div class="nav-pills" id="pills"></div>
<div>
<span id="sc">1 / 10</span>
<button onclick="go(-1)">←</button>
<button onclick="go(1)">→</button>
</div>
</div>

<div id="slides-container"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>

/* =========================
   UPDATED SLIDES ARRAY ONLY
   ========================= */

const SLIDES=[

{ id:'mkt',label:'Market size',render:()=>`
<div class="slide-header">
<h2>Balances doubled since 2011. Growth is compressing.</h2>
<p>$1.67T outstanding. Growth slowing to ~2–3%.</p>
</div>`},

{ id:'lenders',label:'Lender landscape',render:()=>`
<h2>Banks are back. Captives dominate new.</h2>`},

{ id:'credit',label:'Credit mix',render:()=>`
<h2>69% prime. Capital One plays in the other 31%.</h2>`},

{ id:'delinq',label:'Delinquencies',render:()=>`
<h2>Delinquencies at 15-year highs</h2>`},

{ id:'rates',label:'Rates & affordability',render:()=>`
<h2>APRs doubled. Payments still rising.</h2>`},

{ id:'ev',label:'EVs',render:()=>`
<h2>EV shift is lease-driven</h2>`},

{ id:'genz',label:'Gen Z',render:()=>`
<h2>Gen Z = near-prime, digital-first</h2>`},

{ id:'ai',label:'AI',render:()=>`
<h2>AI adoption is accelerating</h2>`},

{ id:'peers',label:'Peer comparison',render:()=>`
<h2>Capital One vs peers</h2>`},

{ id:'squeeze',label:'The squeeze',render:()=>`
<h2>Structural squeeze in near-prime</h2>`}

];

/* =========================
   NAV + RENDER LOGIC
   ========================= */

let cur=0;
const container=document.getElementById('slides-container');
const pillsEl=document.getElementById('pills');
const scEl=document.getElementById('sc');

SLIDES.forEach((s,i)=>{
const p=document.createElement('button');
p.className='pill'+(i===0?' on':'');
p.textContent=s.label;
p.onclick=()=>goTo(i);
pillsEl.appendChild(p);
});

function render(i){
const div=document.createElement('div');
div.className='slide active';
div.innerHTML=SLIDES[i].render();
container.innerHTML='';
container.appendChild(div);
}

function goTo(n){
cur=Math.max(0,Math.min(n,SLIDES.length-1));
render(cur);
scEl.textContent=(cur+1)+' / '+SLIDES.length;
document.querySelectorAll('.pill').forEach((p,i)=>{
p.classList.toggle('on',i===cur);
});
}

function go(d){
goTo(cur+d);
}

render(0);

</script>
</body>
</html>
